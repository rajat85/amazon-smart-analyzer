<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Smart Analyzer Settings</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #333;
    }
    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 5px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #ff9900;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover {
      background: #e68a00;
    }
    .info {
      margin-top: 15px;
      padding: 10px;
      background: #f0f8ff;
      border-left: 3px solid #0066cc;
      font-size: 12px;
      line-height: 1.5;
    }
    .info a {
      color: #0066cc;
      text-decoration: none;
    }
    .info a:hover {
      text-decoration: underline;
    }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <h1>Amazon Smart Analyzer</h1>

  <label for="apiKey">Google Gemini API Key:</label>
  <input type="text" id="apiKey" placeholder="Enter your API key here">

  <button id="saveBtn">Save API Key</button>

  <div id="status" class="status"></div>

  <div class="info">
    <strong>Need an API key?</strong><br>
    Get a free key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>
    <br><br>
    <small>Your API key is stored locally in your browser and never shared.</small>
  </div>

  <script src="popup.js"></script>
</body>
</html>
